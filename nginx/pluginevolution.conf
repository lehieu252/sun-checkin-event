# ========================
# FE
# ========================
server {
    server_name pluginevolution.site;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/pluginevolution.site/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/pluginevolution.site/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

# ========================
# API
# ========================
server {
    server_name api.pluginevolution.site;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/pluginevolution.site/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/pluginevolution.site/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = pluginevolution.site) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name pluginevolution.site;
    return 404; # managed by Certbot


}
server {
    if ($host = api.pluginevolution.site) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name api.pluginevolution.site;
    return 404; # managed by Certbot
}

